services:
  - type: web
    name: placewise-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && python ml/train.py"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
